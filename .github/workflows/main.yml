name: Deploy Backend Ventas
on:
  push:
    branches: [ "main" ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar con Maven
        working-directory: Springboot-API-REST
        run: mvn clean package -DskipTests

      - name: Subir JAR a S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        working-directory: Springboot-API-REST
        run: aws s3 cp target/*.jar s3://innovatech-deploy-bucket-2026/backend-ventas.jar

      - name: Desplegar en EC2 via SSM
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          INSTANCE_ID: ${{ secrets.INSTANCE_ID }}
        run: |
          if [ -z "$INSTANCE_ID" ]; then
            echo "ERROR: el secret INSTANCE_ID está vacío o no existe."
            exit 1
          fi

          COMMANDS='{"commands":[
            "aws s3 cp s3://innovatech-deploy-bucket-2026/backend-ventas.jar /home/ssm-user/app/ventas.jar",
            "pkill -f ventas.jar || true",
            "sleep 2",
            "nohup java -jar /home/ssm-user/app/ventas.jar > /home/ssm-user/app/ventas.log 2>&1 &"
          ]}'

          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$COMMANDS"
